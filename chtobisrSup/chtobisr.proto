Terminator = CR LF;
ReplyTimeout = 200;
ReadTimeout = 200;

getID {
    out "*IDN\$1?";
    in "%#s";
    ExtraInput = Ignore;
	wait 50;
}

setRESET {
    out "*RST\$1";
	wait 50;
}

getINTERLOCK {
    out "SYSTEM\$1:LOCK?";
    in "%{OFF|ON}";
	wait 50;
}

getSTATUS {
    out "SYSTEM\$1:STATUS?";
    in "%(\$2STAT:HIGH)4X%4X";
	wait 50;
}

getFAULT {
    out "SYSTEM\$1:FAULT?";
    in "%(\$2FAULT:HIGH)4X%4X";
	wait 50;
}

getAMP {
    out "SOURce\$1:POWer:LEVel:IMMediate:AMPLitude?";
    in "%f";
	wait 50;
}

setAMP {
    out "SOURce\$1:POWer:LEVel:IMMediate:AMPLitude %.3f";
	wait 50;
}

getSTAT {
    out "SOURce\$1:AM:STATe?";
    in "%{OFF|ON}";
	wait 50;
}

setSTAT {
    out "SOURce\$1:AM:STATe %{OFF|ON}";
	wait 50;
}
